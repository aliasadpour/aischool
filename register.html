<!DOCTYPE html>
<html>

<head>

<title>Create Account - Ali Academy</title>


<style>

body{

margin:0;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-family:Arial;

background:linear-gradient(135deg,#0f172a,#2563eb);

}


.box{

background:white;

padding:40px;

border-radius:20px;

width:350px;

}


input{

width:100%;

padding:12px;

margin:10px 0;

border-radius:10px;

border:1px solid #ccc;

}



button{

width:100%;

padding:15px;

border:none;

border-radius:20px;

background:#2563eb;

color:white;

font-size:18px;

cursor:pointer;

}


a{

display:block;

margin-top:15px;

text-align:center;

}


</style>


</head>


<body>


<div class="box">


<h2>
📝 Create Account
</h2>



<input 
id="name"
placeholder="Full name">



<input 
id="email"
placeholder="Email">



<input 
id="password"
type="password"
placeholder="Password">



<button onclick="register()">

Register

</button>



<p id="message"></p>



<a href="login.html">

Already have account? Login

</a>



</div>





<script>


function register(){


let name =
document.getElementById("name").value;


let email =
document.getElementById("email").value;


let password =
document.getElementById("password").value;



if(
name=="" ||
email=="" ||
password==""
){

alert("Fill all fields");

return;

}



let users =
JSON.parse(
localStorage.getItem("users")
) || [];





let exists =
users.find(
u=>u.email===email
);



if(exists){


document.getElementById("message").innerHTML=

"❌ Email already exists";


return;

}





let user={


id:Date.now(),

name:name,

email:email,

password:password,

role:"student"


};




users.push(user);



localStorage.setItem(

"users",

JSON.stringify(users)

);




alert(
"Account created successfully"
);



window.location.href="login.html";



}



</script>


</body>

</html>
