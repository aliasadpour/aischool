<!DOCTYPE html>
<html>

<head>

<title>Ali Academy Login</title>

<style>

body{

margin:0;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

font-family:Arial;

background:linear-gradient(135deg,#0f172a,#2563eb);

}


.box{

background:white;

padding:40px;

border-radius:20px;

width:350px;

}


input{

width:100%;

padding:12px;

margin:10px 0;

border-radius:10px;

border:1px solid #ccc;

}


button{

width:100%;

padding:15px;

border:none;

border-radius:20px;

background:#2563eb;

color:white;

font-size:18px;

cursor:pointer;

}


</style>

</head>


<body>


<div class="box">


<h2>
🔐 Ali Academy Login
</h2>


<input 
id="email"
placeholder="Email">


<input 
id="password"
type="password"
placeholder="Password">



<button onclick="login()">

Login

</button>


<p id="message"></p>


</div>





<script>


function login(){



let email =

document.getElementById("email").value;



let password =

document.getElementById("password").value;





let users =

JSON.parse(

localStorage.getItem("users")

) || [];





let user = users.find(

u =>

u.email === email

&&

u.password === password

);





if(user){



localStorage.setItem(

"currentUser",

JSON.stringify(user)

);



window.location.href="index.html";


}

else{


document.getElementById("message").innerHTML=

"❌ Wrong email or password";


}



}



</script>



</body>

</html>
