<!DOCTYPE html>
<html>

<head>

<title>Ali Academy Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:#ffffff22;
padding:25px;
border-radius:20px;
margin-bottom:25px;
}

input,select,textarea,button{

width:90%;
padding:12px;
margin:8px;
border-radius:10px;
border:none;

}

textarea{
height:100px;
}

button{

background:#22c55e;
color:white;
cursor:pointer;

}

.item{

background:#0005;
padding:20px;
margin:15px 0;
border-radius:15px;

}

audio,video{

width:100%;

}

.delete{

background:red;

}

</style>

</head>


<body>


<div class="container">


<h1>
👨‍🏫 Ali Academy Admin Panel
</h1>



<!-- ===========================
ASSESSMENT AUDIO SECTION
=========================== -->


<div class="card">


<h2>
🎧 Assessment Audio Units
</h2>


<select id="course">

<option>Business English</option>
<option>KET</option>
<option>PET</option>
<option>FCE</option>
<option>Trinity Grade 1</option>
<option>Trinity Grade 2</option>
<option>Trinity Grade 3</option>
<option>Trinity Grade 4</option>
<option>Trinity Grade 5</option>
<option>Trinity Grade 6</option>

</select>


<input 
id="unitName"
placeholder="Unit name">


<input 
id="audioFile"
type="file"
accept="audio/*">


<button onclick="addUnit()">

Upload Audio Unit

</button>


<div id="unitsList"></div>


</div>





<!-- ===========================
GRAMMAR VIDEO SECTION
=========================== -->


<div class="card">


<h2>
🎥 Grammar Videos
</h2>


<input
id="grammarTitle"
placeholder="Grammar title">


<textarea
id="subGrammar"
placeholder="Sub grammars

Example:

Positive sentences
Negative sentences
Questions
Short answers">

</textarea>


<input
id="videoFile"
type="file"
accept="video/mp4">


<input
id="quizLink"
placeholder="Google Quiz Link">


<button onclick="addGrammarVideo()">

Upload Grammar Video

</button>


<div id="videosList"></div>


</div>
<script>


// =====================================
// SUPABASE CONNECTION
// =====================================


const SUPABASE_URL =

"https://xtmjnawhfxfdjlijfxgj.supabase.co";



const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0bWpuYXdoZnhmZGpsaWpmeGdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzODkzNTksImV4cCI6MjA5OTY1MzV9.EXemiLr6GbCN5yFzLtmotBVW2EPFKKxCRQ0m8cx0O8s";



const supabaseClient =

supabase.createClient(

SUPABASE_URL,

SUPABASE_KEY

);





// =====================================
// UPLOAD FILE TO SUPABASE STORAGE
// =====================================


async function uploadFile(bucket,file){

console.log("Uploading:", file.name);
console.log("Bucket:", bucket);
  
let fileName =

Date.now() + "-" + file.name;



const {data,error}=

await supabaseClient

.storage

.from(bucket)

.upload(

fileName,

file

);



if(error){

alert(
"Upload error: " + error.message
);

return null;

}




const url =

supabaseClient

.storage

.from(bucket)

.getPublicUrl(fileName)

.data

.publicUrl;



return url;


}







// =====================================
// ADD AUDIO UNIT
// =====================================


async function addUnit(){



let course =

document.getElementById("course").value;



let name =

document.getElementById("unitName").value;



let file =

document.getElementById("audioFile").files[0];



if(!file){

alert("Please select audio");

return;

}



let audioURL =

await uploadFile(
"level 1",
file
);


if(!audioURL)

return;





const {error}=

await supabaseClient

.from("units")

.insert({

course:course,

name:name,

audio_url:audioURL

});




if(error){

alert(error.message);

return;

}



alert("Audio Unit Added");



loadUnits();


}







// =====================================
// ADD GRAMMAR VIDEO
// =====================================


async function addGrammarVideo(){



let title =

document.getElementById("grammarTitle").value;



let sub =

document.getElementById("subGrammar").value;



let file =

document.getElementById("videoFile").files[0];



let quiz =

document.getElementById("quizLink").value;



if(!file){

alert("Please select video");

return;

}



let videoURL =

await uploadFile(
"present simple",
file
);



if(!videoURL)

return;




const {error}=

await supabaseClient

.from("grammarVideos")

.insert({

grammar_title:title,

sub_grammars:sub,

video_url:videoURL,

quiz_link:quiz

});




if(error){

alert(error.message);

return;

}



alert("Grammar Video Added");



loadVideos();


}







// =====================================
// LOAD AUDIO UNITS
// =====================================


async function loadUnits(){



const {data,error}=

await supabaseClient

.from("units")

.select("*")

.order(

"id",

{ascending:false}

);



let box =

document.getElementById("unitsList");



box.innerHTML="";



if(error){

box.innerHTML=error.message;

return;

}



data.forEach(item=>{


box.innerHTML +=


`

<div class="item">


<h3>

${item.course}

</h3>


<p>

${item.name}

</p>



<audio controls>

<source src="${item.audio_url}">

</audio>


</div>

`;


});



}

  // =====================================
// LOAD GRAMMAR VIDEOS
// =====================================


async function loadVideos(){


const {data,error}=

await supabaseClient

.from("grammarVideos")

.select("*")

.order(

"id",

{ascending:false}

);



let box =

document.getElementById("videosList");



box.innerHTML="";



if(error){

box.innerHTML=error.message;

return;

}



data.forEach(item=>{


box.innerHTML +=


`

<div class="item">


<h3>

${item.grammar_title}

</h3>



<p>

<b>Sub Grammars:</b>

<br>

${item.sub_grammars}

</p>



<video controls>

<source src="${item.video_url}" type="video/mp4">

</video>



<br><br>


<a href="${item.quiz_link}" target="_blank">

Open Google Quiz

</a>



</div>

`;



});


}






// =====================================
// START
// =====================================


loadUnits();

loadVideos();



</script>


</div>

</body>

</html>
