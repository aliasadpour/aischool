<!DOCTYPE html>
<html>

<head>

<title>Grammar Video Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#ffffff22;
padding:30px;
border-radius:20px;
margin-bottom:25px;
}

input,textarea,button{

width:90%;
padding:15px;
margin:10px;
border-radius:10px;
border:none;

}

textarea{
height:100px;
}


button{

background:#22c55e;
color:white;
cursor:pointer;

}


.video{

background:#0005;
padding:20px;
border-radius:15px;
margin:20px 0;

}


video{

width:100%;

}


.delete{

background:red;

}

</style>

</head>


<body>


<div class="container">


<h1>
🎥 Grammar Video Admin
</h1>


<div class="card">


<h2>Add Grammar Video</h2>


<input
id="grammarTitle"
placeholder="Grammar title">

<br>


<textarea
id="subGrammar"
placeholder="Sub grammars

Example:
Positive sentences,
Negative sentences,
Questions,
Short answers">

</textarea>


<br>


<input
id="videoFile"
type="file"
accept="video/mp4">


<br>


<input
id="quizLink"
placeholder="Google Quiz Link">


<br>


<button onclick="addVideo()">

Upload Video

</button>


<p id="status"></p>


</div>



<div class="card">

<h2>
Uploaded Videos
</h2>


<div id="list"></div>


</div>


</div>





<script>


// ===============================
// SUPABASE CONNECTION
// ===============================


const SUPABASE_URL =
"https://xtmjnawhfxfdjlijfxgj.supabase.co";


const SUPABASE_KEY =
"PASTE_YOUR_KEY_HERE";


const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);





// ===============================
// UPLOAD VIDEO TO STORAGE
// ===============================


async function uploadVideo(file){


let filename =
Date.now()+"-"+file.name;



let {data,error}=

await supabaseClient
.storage
.from("lesson-videos")
.upload(
filename,
file
);



if(error){

alert(error.message);

return null;

}




let url =

supabaseClient
.storage
.from("lesson-videos")
.getPublicUrl(filename)
.data
.publicUrl;



return url;


}






// ===============================
// ADD VIDEO
// ===============================


async function addVideo(){



let title =
document.getElementById("grammarTitle").value;



let sub =
document.getElementById("subGrammar").value;



let file =
document.getElementById("videoFile").files[0];



let quiz =
document.getElementById("quizLink").value;



if(!title || !file){

alert("Enter title and choose video");

return;

}



document.getElementById("status").innerHTML =
"Uploading...";



let videoURL =
await uploadVideo(file);



if(!videoURL)
return;



let {error}=

await supabaseClient
.from("grammarVideos")
.insert({

grammar_title:title,

sub_grammars:sub,

video_url:videoURL,

quiz_link:quiz

});



if(error){

alert(error.message);

return;

}



document.getElementById("status").innerHTML =
"✅ Uploaded";


loadVideos();


}







// ===============================
// LOAD VIDEOS
// ===============================


async function loadVideos(){



let {data,error}=

await supabaseClient
.from("grammarVideos")
.select("*")
.order("id",{ascending:false});



let list =
document.getElementById("list");


list.innerHTML="";



if(error){

list.innerHTML=error.message;

return;

}



data.forEach(item=>{


list.innerHTML +=


`

<div class="video">


<h3>
${item.grammar_title}
</h3>


<p>

<b>Sub Grammars:</b>

<br>

${item.sub_grammars}

</p>



<video controls>

<source src="${item.video_url}" type="video/mp4">

</video>



<br><br>


<a href="${item.quiz_link}" target="_blank">

Open Quiz

</a>



<br><br>


<button class="delete"

onclick="deleteVideo(${item.id})">

Delete

</button>


</div>

`;


});


}






// ===============================
// DELETE
// ===============================


async function deleteVideo(id){


if(!confirm("Delete this video?"))
return;



await supabaseClient

.from("grammarVideos")

.delete()

.eq("id",id);



loadVideos();


}






loadVideos();


</script>


</body>

</html>
