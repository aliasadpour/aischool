<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Grammar Details</title>


<style>


body{

margin:0;

padding:40px;

font-family:Arial;

background:linear-gradient(135deg,#0f172a,#2563eb);

color:white;

}



.container{

max-width:1000px;

margin:auto;

}



h1{

text-align:center;

font-size:40px;

}



.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:25px;

margin-top:40px;

}



.card{

background:rgba(255,255,255,.15);

padding:30px;

border-radius:25px;

text-align:center;

font-size:20px;

transition:.3s;

}



.card:hover{

transform:translateY(-8px);

background:rgba(255,255,255,.3);

}



a{

color:white;

text-decoration:none;

}



.back{

background:#64748b;

padding:12px 25px;

border-radius:25px;

border:none;

color:white;

cursor:pointer;

}



</style>


</head>



<body>



<div class="container">



<button class="back" onclick="history.back()">

⬅ Back

</button>




<h1 id="title">

Grammar

</h1>




<div id="list" class="cards">

</div>



</div>







<script src="grammarDatabase.js"></script>



<script>




async function loadGrammar(){



let params =

new URLSearchParams(

window.location.search

);



let id =

params.get("id");





let data =

await getGrammarVideos();





let item =

data.find(

x=>x.id==id

);





let title =

document.getElementById("title");



let box =

document.getElementById("list");





if(!item){



title.innerHTML=

"Grammar not found";


return;


}






title.innerHTML=

"📘 "+item.grammarTitle;






box.innerHTML="";






item.subGrammars.forEach(

(sub,index)=>{



box.innerHTML +=



`

<div class="card">


<a href="grammarLesson.html?id=${item.id}&sub=${index}">


📖 ${sub}


</a>


</div>


`;



});



}







loadGrammar();



</script>



</body>

</html>
