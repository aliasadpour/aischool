<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Grammar Videos</title>


<style>


body{

margin:0;

padding:40px;

font-family:Arial;

background:linear-gradient(135deg,#0f172a,#2563eb);

color:white;

}



.container{

max-width:1000px;

margin:auto;

}



h1{

text-align:center;

font-size:40px;

}



.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:25px;

margin-top:40px;

}



.card{

background:rgba(255,255,255,.15);

padding:30px;

border-radius:25px;

text-align:center;

font-size:22px;

cursor:pointer;

transition:.3s;

}



.card:hover{

transform:translateY(-10px);

background:rgba(255,255,255,.3);

}



a{

color:white;

text-decoration:none;

}



.back{

background:#64748b;

padding:12px 25px;

border-radius:25px;

color:white;

border:none;

cursor:pointer;

}



</style>


</head>



<body>


<div class="container">


<button class="back" onclick="history.back()">

⬅ Back

</button>



<h1>

🎬 Grammar Videos

</h1>



<div id="list" class="cards">

</div>



</div>






<script src="grammarDatabase.js"></script>


<script>



async function showGrammar(){



let data =

await getGrammarVideos();



let box =

document.getElementById("list");



box.innerHTML="";




if(data.length===0){



box.innerHTML=

`

<h2>

No grammar videos available

</h2>

`;

return;


}






data.forEach(item=>{



box.innerHTML +=


`

<div class="card">


<a href="grammar.html?id=${item.id}">


📘 ${item.grammarTitle}


</a>


</div>


`;



});



}





showGrammar();



</script>



</body>

</html>
